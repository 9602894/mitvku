name: Sync and Deploy from witv

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Clone source repository
        run: git clone https://github.com/tytestelle/witv.git /tmp/witv-source

      - name: Copy all files from source repository
        run: |
          rsync -av --exclude='.git' /tmp/witv-source/ ./
          chmod +x deploy_ku9.sh

      - name: Run deploy_ku9.sh (ignore build errors)
        run: ./deploy_ku9.sh || echo "⚠️ 构建失败，但配置已生成"
        continue-on-error: true

      - name: Copy config files to res folder
        if: always()
        run: |
          mkdir -p res
          if [ -d "./config" ] && [ "$(ls -A ./config)" ]; then
            cp -r ./config/* ./res/
            echo "✅ 配置文件已复制到 res 文件夹"
          else
            echo "⚠️ config 目录不存在或为空"
          fi
