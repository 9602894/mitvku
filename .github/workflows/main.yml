name: Sync and Deploy from witv

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出当前仓库（你的目标仓库）
      - name: Checkout current repository
        uses: actions/checkout@v4

      # 2. 克隆源仓库（tytestelle/witv）到临时目录
      - name: Clone source repository
        run: |
          git clone https://github.com/tytestelle/witv.git /tmp/witv-source

      # 3. 将源仓库的所有文件复制到当前仓库根目录
      - name: Copy all files from source repository
        run: |
          # 复制所有文件（包括隐藏文件），覆盖同名文件
          rsync -av --exclude='.git' /tmp/witv-source/ ./
          # 确保 deploy_ku9.sh 有执行权限
          chmod +x deploy_ku9.sh

      # 4. 执行 deploy_ku9.sh 脚本
      - name: Run deploy_ku9.sh
        run: |
          ./deploy_ku9.sh

      # 5. 将生成的配置文件复制到根目录的 res 文件夹
      - name: Copy config files to res folder
        run: |
          # 创建 res 目录
          mkdir -p res
          # 复制 config 目录下所有内容到 res
          if [ -d "./config" ]; then
            cp -r ./config/* ./res/
            echo "✅ 配置文件已复制到 res 文件夹"
          else
            echo "⚠️ config 目录不存在，跳过复制"
          fi

      # 6. （可选）提交并推送变更到当前仓库
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # 检查是否有变更需要提交
          if git diff --staged --quiet; then
            echo "没有变更需要提交"
          else
            git commit -m "chore: sync from tytestelle/witv and generate configs"
            git push
          fi
